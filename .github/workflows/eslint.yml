name: ESLint

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]
  schedule:
    - cron: "36 18 * * 3"

jobs:
  eslint:
    name: Frontend ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ESLint
        run: |
          cd frontend
          npm install @microsoft/eslint-formatter-sarif@3.1.0

      - name: Run ESLint
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: |
          cd frontend
          npx eslint ./src/ \
            --config .eslintrc.js \
            --ext .js,.jsx,.ts,.tsx \
            --format json \
            --output-file eslint-results.json
        continue-on-error: true

      - name: Filter only errors from ESLint results
        run: |
          jq '[.[] | select(.severity == 2)]' frontend/eslint-results.json > frontend/eslint-errors.json

      - name: Convert filtered results to SARIF
        run: |
          npx @microsoft/eslint-formatter-sarif frontend/eslint-errors.json > frontend/eslint-results.sarif

      - name: Upload analysis results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend/eslint-results.sarif
          wait-for-processing: true
